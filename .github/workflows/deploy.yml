name: Auto Deploy Web TS
on:
  push:
    branches:
      - main
      - staging
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
              echo "🚀 Deploying Web TS STAGING..."
              cd ~/classroom-staging/classroom-management_web-announcement_ts
              git pull origin staging
              npm install
              npm run build
              # ถ้ารันด้วย PM2 ก็สั่ง pm2 restart ... ตรงนี้

            elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "🔥 Deploying Web TS PRODUCTION..."
              cd ~/classroom-management/classroom-management_web-announcement_ts
              git pull origin main
              npm install
              npm run build
            fi
