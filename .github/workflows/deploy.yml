name: Auto Deploy to Server

# บอก GitHub ว่าให้ทำงานตอนที่มีการ Push (หรือ Merge) เข้ากิ่ง main กับ staging
on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 🟢 ถ้าเป็นการแก้โค้ดที่กิ่ง STAGING
            if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
              echo "🚀 Deploying to STAGING Environment..."
              cd ~/classroom-staging/classroom-management_backend
              git pull origin staging
              
              # สั่งรีสตาร์ทเซิร์ฟเวอร์ตัวเทส (แก้ชื่อ service ให้ตรงกับของมึง)
              # sudo systemctl restart fastapi-staging

            # 🔴 ถ้าเป็นการแก้โค้ดที่กิ่ง MAIN (PRODUCTION)
            elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "🔥 Deploying to PRODUCTION Environment..."
              cd ~/classroom-management/classroom-management_backend
              git pull origin main
              
              # สั่งรีสตาร์ทเซิร์ฟเวอร์ตัวจริง
              # sudo systemctl restart fastapi-production
            fi